version: "3.9"

services:
  mongodb:
    image: mongo:7
    container_name: fuelmap-mongodb
    environment:
      MONGO_INITDB_DATABASE: fuelmap
    ports:
      - "27017:27017"
    volumes:
      - mongodata:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.runCommand({ ping: 1 })"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: fuelmap-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    container_name: fuelmap-api
    env_file:
      - .env
    environment:
      MONGODB_URI: mongodb://mongodb:27017/fuelmap
      REDIS_URL: redis://redis:6379
      AI_SERVICE_URL: http://ai:8000
    ports:
      - "4000:4000"
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy

  ai:
    build:
      context: .
      dockerfile: services/ai/Dockerfile
    container_name: fuelmap-ai
    env_file:
      - .env
    ports:
      - "8000:8000"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: fuelmap-web
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:4000
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  mongodata:
